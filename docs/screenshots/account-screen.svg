  <rect x="18" y="595" width="194" height="58" rx="10" fill="#173456" stroke="#2f80ed"/><text x="40" y="620" fill="#fff" font-family="Arial" font-size="15" font-weight="700">Sign in</text><text x="40" y="640" fill="#89a0ba" font-family="Arial" font-size="11">Optional · Local Mode active</text>
  <text x="275" y="65" fill="#eef2fb" font-family="Arial" font-size="30" font-weight="700">Forge account</text><text x="275" y="95" fill="#8b98ad" font-family="Arial" font-size="15">One desktop control center for local, remote, and cloud AI.</text>
  <text x="275" y="185" fill="#7fbfff" font-family="Arial" font-size="12" letter-spacing="2">OPTIONAL FORGE ACCOUNT</text><text x="275" y="230" fill="#eef2fb" font-family="Arial" font-size="31" font-weight="700">Local Mode works</text><text x="275" y="268" fill="#eef2fb" font-family="Arial" font-size="31" font-weight="700">without signing in.</text><text x="275" y="310" fill="#95a3b7" font-family="Arial" font-size="15">Create an account for device management and future</text><text x="275" y="335" fill="#95a3b7" font-family="Arial" font-size="15">encrypted sync. Local data stays on this device.</text>
  <rect x="275" y="380" width="360" height="100" rx="12" fill="#10251d" stroke="#286847"/><circle cx="310" cy="420" r="17" fill="#286847"/><path d="M302 420l6 6 12-15" fill="none" stroke="#fff" stroke-width="3"/><text x="340" y="414" fill="#eef2fb" font-family="Arial" font-size="14" font-weight="700">Provider credentials remain local</text><text x="340" y="438" fill="#91a0b6" font-family="Arial" font-size="12">Signing in never uploads keys from the</text><text x="340" y="457" fill="#91a0b6" font-family="Arial" font-size="12">native credential manager.</text>
  <rect x="680" y="135" width="455" height="500" rx="14" fill="#0f1620" stroke="#243244"/><text x="715" y="185" fill="#eef2fb" font-family="Arial" font-size="23" font-weight="700">Sign in</text><text x="715" y="214" fill="#8b98ad" font-family="Arial" font-size="14">Use your Forge account credentials.</text>
  <rect x="715" y="245" width="185" height="42" rx="8" fill="#101824" stroke="#315078"/><text x="745" y="271" fill="#b8c7da" font-family="Arial" font-size="13">Continue with Google</text><rect x="915" y="245" width="185" height="42" rx="8" fill="#101824" stroke="#315078"/><text x="947" y="271" fill="#b8c7da" font-family="Arial" font-size="13">Continue with GitHub</text>
  <text x="715" y="325" fill="#aab7ca" font-family="Arial" font-size="13">Email</text><rect x="715" y="337" width="385" height="44" rx="8" fill="#0b1119" stroke="#334356"/><text x="730" y="364" fill="#68778d" font-family="Arial" font-size="13">you@example.com</text><text x="715" y="415" fill="#aab7ca" font-family="Arial" font-size="13">Password</text><rect x="715" y="427" width="385" height="44" rx="8" fill="#0b1119" stroke="#334356"/><text x="730" y="455" fill="#68778d" font-family="Arial" font-size="15">••••••••••••</text>
  <rect x="715" y="500" width="385" height="46" rx="8" fill="#2f80ed"/><text x="880" y="529" fill="#fff" font-family="Arial" font-size="14" font-weight="700">Sign in</text><text x="715" y="585" fill="#7fbfff" font-family="Arial" font-size="13">Forgot password?</text><text x="1004" y="585" fill="#7fbfff" font-family="Arial" font-size="13">Create account</text>
